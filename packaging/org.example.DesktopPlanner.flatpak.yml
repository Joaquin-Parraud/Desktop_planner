app-id: org.example.DesktopPlanner
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: desktop-planner
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
  - --filesystem=xdg-data/desktop-planner:create
modules:
  - name: desktop-planner
    buildsystem: meson
    sources:
      - type: dir
        path: ..
